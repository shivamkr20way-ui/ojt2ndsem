<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrapes" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#4A1521" />
      <stop offset="100%" stop-color="#1B050B" />
    </radialGradient>

    <!-- Leaf Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8F8C36" />
      <stop offset="50%" stop-color="#555823" />
      <stop offset="100%" stop-color="#2D3010" />
    </linearGradient>

    <!-- Grape Color Gradients (Red/Burgundy) -->
    <radialGradient id="grapeRed1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D8607A" />
      <stop offset="40%" stop-color="#8E2D44" />
      <stop offset="100%" stop-color="#3D0A16" />
    </radialGradient>

    <radialGradient id="grapeRed2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#AF3C5C" />
      <stop offset="50%" stop-color="#6F1531" />
      <stop offset="100%" stop-color="#24000C" />
    </radialGradient>

    <radialGradient id="grapeGold" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF3CD" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#70540C" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrapes)"/>

  <!-- Artistic Sun Rays -->
  <path d="M 0 0 L 250 0 L 0 500 Z" fill="#D4AF37" opacity="0.08"/>
  <path d="M 0 0 L 450 0 L 0 300 Z" fill="#D4AF37" opacity="0.05"/>
  <path d="M 0 0 L 150 0 L 0 600 Z" fill="#D4AF37" opacity="0.1"/>

  <!-- Vine Branch -->
  <path d="M -50 80 Q 200 60, 450 150 T 850 110" stroke="#4A341A" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 350 125 Q 400 200, 390 320" stroke="#4A341A" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Grape Tendrils (curly lines) -->
  <path d="M 200 75 Q 180 140, 210 160 T 170 200" stroke="#8F8C36" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 450 150 Q 510 200, 480 230 T 540 280" stroke="#8F8C36" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Leaves Background (Dark silhouettes) -->
  <path d="M 100 100 Q 80 0, 180 30 T 260 90 T 160 160 Z" fill="#2E3010" opacity="0.6"/>
  <path d="M 500 120 Q 580 40, 640 110 T 680 200 T 550 200 Z" fill="#2E3010" opacity="0.6"/>

  <!-- Grape Bunch (Layered for depth) -->
  <!-- Layer 1 (Back/Shadow grapes) -->
  <circle cx="370" cy="280" r="28" fill="url(#grapeRed2)"/>
  <circle cx="410" cy="280" r="28" fill="url(#grapeRed2)"/>
  <circle cx="350" cy="320" r="28" fill="url(#grapeRed2)"/>
  <circle cx="430" cy="320" r="28" fill="url(#grapeRed2)"/>
  <circle cx="390" cy="350" r="28" fill="url(#grapeRed2)"/>

  <!-- Layer 2 (Middle) -->
  <circle cx="360" cy="240" r="30" fill="url(#grapeRed1)"/>
  <circle cx="420" cy="240" r="30" fill="url(#grapeRed1)"/>
  <circle cx="340" cy="290" r="30" fill="url(#grapeRed1)"/>
  <circle cx="400" cy="290" r="32" fill="url(#grapeRed1)"/>
  <circle cx="450" cy="295" r="28" fill="url(#grapeRed1)"/>
  <circle cx="370" cy="340" r="30" fill="url(#grapeRed1)"/>
  <circle cx="420" cy="345" r="30" fill="url(#grapeRed1)"/>
  <circle cx="390" cy="390" r="30" fill="url(#grapeRed1)"/>
  <circle cx="410" cy="430" r="28" fill="url(#grapeRed2)"/>

  <!-- Layer 3 (Front/Highlight grapes) -->
  <circle cx="390" cy="210" r="32" fill="url(#grapeRed1)"/>
  <circle cx="380" cy="270" r="32" fill="url(#grapeRed1)"/>
  <circle cx="415" cy="265" r="30" fill="url(#grapeRed1)"/>
  <circle cx="355" cy="310" r="30" fill="url(#grapeRed1)"/>
  <circle cx="410" cy="315" r="32" fill="url(#grapeRed1)"/>
  <circle cx="385" cy="365" r="32" fill="url(#grapeRed1)"/>
  <circle cx="400" cy="415" r="29" fill="url(#grapeRed1)"/>
  <circle cx="395" cy="465" r="26" fill="url(#grapeRed1)"/>

  <!-- Highlighting Grape Details (Shine dots) -->
  <circle cx="380" cy="195" r="4" fill="white" opacity="0.4"/>
  <circle cx="370" cy="255" r="4" fill="white" opacity="0.4"/>
  <circle cx="405" cy="250" r="4" fill="white" opacity="0.4"/>
  <circle cx="375" cy="350" r="4" fill="white" opacity="0.4"/>
  <circle cx="390" cy="400" r="3" fill="white" opacity="0.4"/>

  <!-- Front Vine Leaves -->
  <!-- Left Leaf -->
  <path d="M 330 115 C 290 80, 230 100, 210 150 C 190 200, 230 240, 270 220 C 310 200, 320 160, 330 115 Z" fill="url(#leafGrad)" stroke="#D4AF37" stroke-width="1.5"/>
  <!-- Leaf Veins -->
  <path d="M 330 115 Q 260 160, 225 180" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 290 140 Q 260 120, 230 120" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 275 160 Q 250 180, 235 200" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Right Leaf -->
  <g transform="translate(680, 190) scale(-1, 1) rotate(25)">
    <path d="M 300 80 C 260 45, 200 65, 180 115 C 160 165, 200 205, 240 185 C 280 165, 290 125, 300 80 Z" fill="url(#leafGrad)" stroke="#D4AF37" stroke-width="1.5"/>
    <path d="M 300 80 Q 230 125, 195 145" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Elegant Typography Overlay -->
  <text x="750" y="550" font-family="'Playfair Display', serif" font-size="28" font-weight="bold" fill="#F5E6CC" text-anchor="end" letter-spacing="4">HARVEST</text>
  <text x="750" y="575" font-family="'Inter', sans-serif" font-size="10" fill="#FAF5EB" text-anchor="end" letter-spacing="5" opacity="0.7">SELECT SINGLE VINEYARD FRUIT</text>
</svg>
