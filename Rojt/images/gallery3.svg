<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgTasting" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2D1217" />
      <stop offset="100%" stop-color="#0E0305" />
    </radialGradient>

    <!-- Glass Liquid Gradient -->
    <linearGradient id="wineInGlass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60101B" />
      <stop offset="50%" stop-color="#9E2031" />
      <stop offset="100%" stop-color="#500913" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA7C11" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#FDF0CD" />
    </linearGradient>

    <!-- Wood Board Gradient -->
    <linearGradient id="woodBoard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5C3A21" />
      <stop offset="100%" stop-color="#362213" />
    </linearGradient>
  </defs>

  <!-- Background Canvas -->
  <rect width="800" height="600" fill="url(#bgTasting)"/>

  <!-- Warm Table Spot Light -->
  <ellipse cx="400" cy="500" rx="350" ry="80" fill="#D4AF37" opacity="0.12" filter="blur(20px)"/>

  <!-- Wooden Tasting Board -->
  <path d="M 100 500 Q 400 440, 700 500 L 660 550 Q 400 510, 140 550 Z" fill="url(#woodBoard)" stroke="#AA7C11" stroke-width="1.5"/>

  <!-- Platter Pairings -->
  <!-- Cheese Wedge -->
  <path d="M 220 495 L 280 480 L 260 515 Z" fill="#F4D068" stroke="#D4AF37" stroke-width="1"/>
  <circle cx="240" cy="498" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="255" cy="495" r="3" fill="#D4AF37" opacity="0.5"/>
  <circle cx="250" cy="508" r="1.5" fill="#D4AF37" opacity="0.5"/>

  <!-- Grapes on Board -->
  <circle cx="170" cy="510" r="10" fill="#6F1531"/>
  <circle cx="185" cy="515" r="10" fill="#8E2D44"/>
  <circle cx="175" cy="522" r="10" fill="#AF3C5C"/>
  <circle cx="160" cy="518" r="9" fill="#500913"/>
  <path d="M 180 505 Q 190 495, 175 490" stroke="#8F8C36" stroke-width="1.5" fill="none"/>

  <!-- WINE BOTTLE SILHOUETTE (Back-right) -->
  <g transform="translate(420, 120)">
    <!-- Shadow -->
    <path d="M 50 370 C 50 385, 150 385, 150 370 L 150 170 C 150 140, 115 120, 115 80 L 115 20 C 115 20, 85 20, 85 20 L 85 80 C 85 120, 50 140, 50 170 Z" fill="#000" opacity="0.5" filter="blur(6px)"/>
    <!-- Bottle Shape -->
    <path d="M 50 370 
             C 50 385, 150 385, 150 370 
             L 150 170 
             C 150 145, 110 125, 108 90 
             L 108 20 
             C 108 20, 92 20, 92 20 
             L 92 90 
             C 90 125, 50 145, 50 170 
             Z" fill="#1C2E1A" stroke="url(#goldAccent)" stroke-width="2"/>
    <!-- Gold Neck Foil -->
    <path d="M 92 20 L 108 20 L 107 55 L 93 55 Z" fill="url(#goldAccent)"/>
    <!-- Label -->
    <rect x="58" y="200" width="84" height="110" fill="#FAF5EB" stroke="url(#goldAccent)" stroke-width="1" rx="2"/>
    <!-- Label Text -->
    <text x="100" y="235" font-family="'Playfair Display', serif" font-size="10" font-weight="bold" fill="#722F37" text-anchor="middle" letter-spacing="2">WINE WORLD</text>
    <line x1="75" y1="245" x2="125" y2="245" stroke="#AA7C11" stroke-width="0.8"/>
    <text x="100" y="270" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#1E1E1E" text-anchor="middle" letter-spacing="3">RESERVE</text>
    <text x="100" y="285" font-family="'Inter', sans-serif" font-size="6" fill="#666666" text-anchor="middle" letter-spacing="1">CABERNET SAUVIGNON</text>
  </g>

  <!-- WINE GLASS (Front-left) -->
  <g transform="translate(260, 220)">
    <!-- Glass Stand Base -->
    <ellipse cx="100" cy="280" rx="45" ry="10" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <!-- Glass Stem -->
    <line x1="100" y1="170" x2="100" y2="278" stroke="white" stroke-width="2" opacity="0.8"/>
    
    <!-- Bowl Liquid Base -->
    <path d="M 62 120 
             C 52 165, 70 200, 100 200 
             C 130 200, 148 165, 138 120 
             Z" fill="url(#wineInGlass)"/>
             
    <!-- Bowl Glass Outline -->
    <path d="M 60 70 
             C 60 140, 50 180, 100 200 
             C 150 180, 140 140, 140 70
             Z" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <!-- Top Rim of Glass -->
    <ellipse cx="100" cy="70" rx="40" ry="6" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

    <!-- Liquid Top Oval (surface) -->
    <ellipse cx="100" cy="120" rx="38" ry="8" fill="#B02538" opacity="0.9"/>
    <ellipse cx="100" cy="120" rx="32" ry="5" fill="#E24A61" opacity="0.5"/>

    <!-- Highlights on glass -->
    <path d="M 65 90 C 65 140, 68 170, 100 195" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="125" cy="100" r="2" fill="white" opacity="0.6"/>
    <path d="M 134 110 C 135 130, 133 150, 125 170" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Elegant Framing/Vignette -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="url(#goldAccent)" stroke-width="1" opacity="0.3"/>
  <text x="50" y="70" font-family="'Playfair Display', serif" font-size="28" font-weight="bold" fill="#F5E6CC" letter-spacing="4" opacity="0.9">EXPERIENCE</text>
  <text x="50" y="95" font-family="'Inter', sans-serif" font-size="10" fill="#FAF5EB" letter-spacing="6" opacity="0.7">PRIVATE TASTING SALON</text>
</svg>
