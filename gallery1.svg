<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Sky Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4B1228" />
      <stop offset="35%" stop-color="#722F37" />
      <stop offset="70%" stop-color="#C85A53" />
      <stop offset="100%" stop-color="#F5E6CC" />
    </linearGradient>

    <!-- Sun Glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF5D1" stop-opacity="1" />
      <stop offset="30%" stop-color="#FFD180" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#FF9E80" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#722F37" stop-opacity="0" />
    </radialGradient>

    <!-- Hill Gradient (Back) -->
    <linearGradient id="hillBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9C3E49" />
      <stop offset="100%" stop-color="#541C23" />
    </linearGradient>

    <!-- Hill Gradient (Mid) -->
    <linearGradient id="hillMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7E3A43" />
      <stop offset="100%" stop-color="#421419" />
    </linearGradient>

    <!-- Hill Gradient (Front) -->
    <linearGradient id="hillFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5E232B" />
      <stop offset="100%" stop-color="#2E0A0E" />
    </linearGradient>

    <!-- Golden Highlight for Hills -->
    <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Sky Canvas -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="400" cy="300" r="250" fill="url(#sunGlow)" pointer-events="none"/>
  <circle cx="400" cy="300" r="40" fill="#FFFFFF"/>

  <!-- Back Mountains/Hills -->
  <path d="M 0 380 Q 200 320, 420 370 T 800 340 L 800 600 L 0 600 Z" fill="url(#hillBack)"/>
  <path d="M 0 380 Q 200 320, 420 370 T 800 340" stroke="url(#goldRim)" stroke-width="2" fill="none"/>

  <!-- Mid Mountains/Hills -->
  <path d="M -50 420 Q 250 380, 500 440 T 850 390 L 850 600 L -50 600 Z" fill="url(#hillMid)"/>
  <path d="M -50 420 Q 250 380, 500 440 T 850 390" stroke="url(#goldRim)" stroke-width="2" fill="none"/>

  <!-- Front Vineyard Hill -->
  <path d="M -20 490 Q 350 430, 820 480 L 820 600 L -20 600 Z" fill="url(#hillFront)"/>
  <path d="M -20 490 Q 350 430, 820 480" stroke="url(#goldRim)" stroke-width="3" fill="none"/>

  <!-- Vineyard Perspective Rows -->
  <!-- Left Side Rows -->
  <path d="M 100 600 L 300 455" stroke="#8F3945" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <path d="M 220 600 L 340 454" stroke="#8F3945" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M 340 600 L 375 455" stroke="#8F3945" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- Center Rows -->
  <path d="M 450 600 L 415 456" stroke="#8F3945" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M 580 600 L 460 455" stroke="#8F3945" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M 720 600 L 520 457" stroke="#8F3945" stroke-width="12" stroke-linecap="round" opacity="0.6"/>

  <!-- Golden posts along rows (Perspective details) -->
  <line x1="100" y1="600" x2="100" y2="570" stroke="#AA7C11" stroke-width="3"/>
  <line x1="220" y1="600" x2="220" y2="575" stroke="#AA7C11" stroke-width="3"/>
  <line x1="340" y1="600" x2="340" y2="580" stroke="#AA7C11" stroke-width="2"/>
  
  <line x1="720" y1="600" x2="720" y2="570" stroke="#AA7C11" stroke-width="3"/>
  <line x1="580" y1="600" x2="580" y2="575" stroke="#AA7C11" stroke-width="3"/>
  <line x1="460" y1="600" x2="460" y2="580" stroke="#AA7C11" stroke-width="2"/>

  <!-- Minimal Estate Silhouette on top of mid hill -->
  <g transform="translate(470, 395) scale(0.6)">
    <!-- Main Villa -->
    <rect x="0" y="20" width="60" height="40" fill="#2E0A0E" />
    <polygon points="30,0 -5,22 65,22" fill="#722F37" stroke="#D4AF37" stroke-width="1"/>
    <!-- Tower -->
    <rect x="50" y="5" width="20" height="55" fill="#2E0A0E" />
    <polygon points="60,-8 45,7 75,7" fill="#722F37" stroke="#D4AF37" stroke-width="1"/>
    <!-- Windows -->
    <rect x="10" y="30" width="8" height="12" fill="#FFF5D1" opacity="0.8"/>
    <rect x="26" y="30" width="8" height="12" fill="#FFF5D1" opacity="0.8"/>
    <rect x="42" y="30" width="8" height="12" fill="#FFF5D1" opacity="0.8"/>
    <rect x="56" y="15" width="8" height="12" fill="#FFF5D1" opacity="0.8"/>
  </g>

  <!-- Elegant Framing/Vignette -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#FAF5EB" stroke-width="2" opacity="0.5"/>
  <text x="50" y="70" font-family="'Playfair Display', serif" font-size="28" font-weight="bold" fill="#FAF5EB" letter-spacing="4" opacity="0.9">ESTATE</text>
  <text x="50" y="95" font-family="'Inter', sans-serif" font-size="10" fill="#FAF5EB" letter-spacing="6" opacity="0.8">WINE WORLD VINEYARDS</text>
</svg>
