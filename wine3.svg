<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#FAF5EB" />
      <stop offset="100%" stop-color="#EAD5C3" />
    </radialGradient>
    
    <!-- Rose Wine Bottle Liquid Gradient -->
    <linearGradient id="roseLiquid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E06A7B" />
      <stop offset="25%" stop-color="#F28E9B" />
      <stop offset="50%" stop-color="#FFA8B6" />
      <stop offset="75%" stop-color="#F28E9B" />
      <stop offset="100%" stop-color="#D45668" />
    </linearGradient>

    <!-- Glass Highlights -->
    <linearGradient id="glassReflection" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="85%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Gold Foil Gradient -->
    <linearGradient id="goldFoil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA7C11" />
      <stop offset="25%" stop-color="#FDF0CD" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="75%" stop-color="#F3E5AB" />
      <stop offset="100%" stop-color="#8A640F" />
    </linearGradient>

    <!-- Label Gradient -->
    <linearGradient id="labelBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FAF0DD" />
    </linearGradient>
  </defs>

  <!-- Ambient Background Canvas -->
  <rect width="400" height="800" fill="url(#bgGrad)" rx="15"/>

  <!-- Shadow below bottle -->
  <ellipse cx="200" cy="740" rx="90" ry="18" fill="#5C4D42" opacity="0.3" filter="blur(8px)"/>

  <!-- BOTTLE GROUP -->
  <g transform="translate(0, 20)">
    <!-- Neck Foil Cap (Gold) -->
    <path d="M 175 140 L 225 140 L 222 230 L 178 230 Z" fill="url(#goldFoil)"/>
    <ellipse cx="200" cy="140" rx="25" ry="5" fill="#8A640F"/>
    <ellipse cx="200" cy="230" rx="22" ry="5" fill="url(#goldFoil)"/>

    <!-- Bottle Body (Rosé Wine Liquid) -->
    <!-- Neck path from cap to shoulders, body to base -->
    <path d="M 178 230 
             C 178 230, 178 350, 176 380
             C 174 410, 120 440, 120 480
             L 120 700
             C 120 725, 280 725, 280 700
             L 280 480
             C 280 440, 226 410, 224 380
             C 222 350, 222 230, 222 230
             Z" fill="url(#roseLiquid)"/>

    <!-- Bottom curve shadow inside bottle -->
    <path d="M 120 700 C 120 730, 280 730, 280 700 C 280 715, 120 715, 120 700 Z" fill="#9C3A48" opacity="0.8"/>

    <!-- Premium Label -->
    <g transform="translate(0, 10)">
      <!-- Label Base -->
      <path d="M 130 490 
               L 270 490
               L 270 630
               L 130 630
               Z" fill="url(#labelBg)" stroke="url(#goldFoil)" stroke-width="3"/>
      
      <!-- Inner Gold Border -->
      <rect x="136" y="496" width="128" height="128" fill="none" stroke="url(#goldFoil)" stroke-width="1" opacity="0.8"/>

      <!-- Wine Logo (Minimalist grapes) -->
      <circle cx="200" cy="520" r="5" fill="#D4AF37"/>
      <circle cx="194" cy="528" r="4" fill="#D4AF37"/>
      <circle cx="206" cy="528" r="4" fill="#D4AF37"/>
      <circle cx="200" cy="535" r="3" fill="#D4AF37"/>
      <path d="M 200 515 Q 203 508 200 503" fill="none" stroke="#D4AF37" stroke-width="1.5"/>

      <!-- Text -->
      <text x="200" y="560" font-family="'Playfair Display', 'Georgia', serif" font-size="12" font-weight="bold" fill="#722F37" text-anchor="middle" letter-spacing="3">WINE WORLD</text>
      <line x1="160" y1="570" x2="240" y2="570" stroke="url(#goldFoil)" stroke-width="1"/>
      <text x="200" y="588" font-family="'Inter', 'Arial', sans-serif" font-size="16" font-weight="bold" fill="#1E1E1E" text-anchor="middle" letter-spacing="4">ROSÉ</text>
      <text x="200" y="605" font-family="'Inter', 'Arial', sans-serif" font-size="8" fill="#666666" text-anchor="middle" letter-spacing="1">PREMIUM SELECTION</text>
      <text x="200" y="618" font-family="'Inter', 'Arial', sans-serif" font-size="7" fill="#AA7C11" text-anchor="middle">VALLEY HARVEST · 2024</text>
    </g>

    <!-- Glass Highlights / Reflections (Gives the shiny glass bottle look) -->
    <path d="M 178 230 
             C 178 230, 178 350, 176 380
             C 174 410, 120 440, 120 480
             L 120 700
             C 120 725, 280 725, 280 700
             L 280 480
             C 280 440, 226 410, 224 380
             C 222 350, 222 230, 222 230
             Z" fill="url(#glassReflection)" pointer-events="none"/>

    <!-- Strong Vertical Highlight -->
    <path d="M 135 470 L 142 470 L 142 690 L 135 685 Z" fill="white" opacity="0.4" pointer-events="none"/>
    <path d="M 183 240 L 186 240 L 186 360 L 183 360 Z" fill="white" opacity="0.3" pointer-events="none"/>
  </g>
</svg>
